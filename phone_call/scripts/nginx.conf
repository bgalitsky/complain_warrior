user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  _;

        client_max_body_size 50M;
        proxy_http_version 1.1;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Static desktop download pages and installers
        location = /downloads/fb-poster {
            return 301 /downloads/fb-poster/;
        }
        location ^~ /downloads/ {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # Complaint Warrior Streamlit app
        location = /complaint_warrior {
            return 301 /complaint_warrior/;
        }
        location ^~ /complaint_warrior/ {
            proxy_pass http://127.0.0.1:8509/complaint_warrior/;
        }

        # Small Claim Court Warrior Streamlit app
        location = /small_claim_court_warrior {
            return 301 /small_claim_court_warrior/;
        }
        location ^~ /small_claim_court_warrior/ {
            proxy_pass http://127.0.0.1:8513/small_claim_court_warrior/;
        }

        # Charge-back Initiator
        location = /charge_back_initiator {
            return 301 /charge_back_initiator/;
        }

        location ^~ /charge_back_initiator/ {
            proxy_pass http://127.0.0.1:8514/charge_back_initiator/;
        }

        # Regulatory Complaint Sender
        location = /cw_regulatory {
            return 301 /cw_regulatory/;
        }

        location ^~ /cw_regulatory/ {
            proxy_pass http://127.0.0.1:8515/cw_regulatory/;
        }
       # OAuth / auth routes
        location = /auth {
            return 302 /auth/start;
        }
        location = /auth/start {
            proxy_pass http://127.0.0.1:8510/auth/start;
        }
        location ^~ /auth/ {
            proxy_pass http://127.0.0.1:8510;
        }
        location /oauth2callback {
            proxy_pass http://127.0.0.1:8510;
        }
        location /gmail_oauth {
            proxy_pass http://127.0.0.1:8510;
        }
        location /authorize_gmail {
            proxy_pass http://127.0.0.1:8510;
        }

        # Twilio / phone endpoints
        location /voice {
            proxy_pass http://127.0.0.1:5000;
        }
        location /voice_human {
            proxy_pass http://127.0.0.1:5000;
        }
        location /transcription {
            proxy_pass http://127.0.0.1:5000;
        }
        location /recording_callback {
            proxy_pass http://127.0.0.1:5000;
        }
        location /status_callback {
            proxy_pass http://127.0.0.1:5000;
        }
        location /incoming_sms {
            proxy_pass http://127.0.0.1:5000;
        }

        # Entry chooser app at root
        location / {
            proxy_pass http://127.0.0.1:8512/;
        }

        error_page 404 /404.html;
        location = /404.html {
            internal;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }
}
